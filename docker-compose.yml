version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - ENDEE_URL=http://mock_endee:8090
    depends_on:
      - mock_endee

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run ui.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend

  mock_endee:
    build:
      context: .
      dockerfile: Dockerfile
    command: python mock_endee.py
    ports:
      - "8090:8090"
